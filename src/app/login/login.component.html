<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-body p-4">
          <h3 class="card-title text-center mb-4">Iniciar Sesión</h3>

          <form [formGroup]="fg" (ngSubmit)="login()">
            <div class="mb-3">
              <label class="form-label">Usuario</label>
              <input type="text" class="form-control" formControlName="usuario"
                     placeholder="Ingresa tu usuario">
              <div *ngIf="fg.controls['usuario'].touched && fg.controls['usuario'].invalid" class="text-danger small mt-1">
                <span *ngIf="fg.controls['usuario'].hasError('required')">El usuario es requerido</span>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control" formControlName="password"
                     placeholder="Ingresa tu contraseña">
              <div *ngIf="fg.controls['password'].touched && fg.controls['password'].invalid" class="text-danger small mt-1">
                <span *ngIf="fg.controls['password'].hasError('required')">La contraseña es requerida</span>
              </div>
            </div>

            <div *ngIf="errorMsg" class="alert alert-danger py-2">{{ errorMsg }}</div>

            <button type="submit" class="btn btn-primary w-100" [disabled]="fg.invalid">
              Entrar
            </button>
          </form>

          <div class="mt-3 text-muted small text-center">
            <strong>Usuario:</strong> admin &nbsp;|&nbsp; <strong>Contraseña:</strong> 1234
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
