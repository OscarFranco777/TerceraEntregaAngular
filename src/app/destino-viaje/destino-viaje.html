<div class="card h-100 shadow-sm border-light">
  <img [src]="destino.imagenUrl" class="card-img-top" alt="Imagen representativa del destino" style="height: 180px; object-fit: cover;">
  
  <div class="card-body text-center">
    <h5 class="card-title text-capitalize fw-bold text-dark">{{ destino.nombre }}</h5>
    <p class="card-text text-muted small">¡Listo para la aventura!</p>
    <button type="button" class="btn btn-outline-primary btn-sm px-4">Ver detalles</button>
  </div>
</div>
