<div class="container mt-4">
  <div class="row">
    <div class="col-md-8 offset-md-2">
      <div class="card shadow">
        <div class="card-header bg-info text-white">
          <h3 class="mb-0">ℹ️ Detalle del Destino</h3>
        </div>
        <div class="card-body">
          <p class="text-muted mb-3">
            Parámetro URL recibido: <code>id = {{ destinoId }}</code>
          </p>
          <h4 class="card-title">{{ destino.nombre }}</h4>
          <p class="card-text">
            <strong>Servicio:</strong> {{ destino.servicio }}
          </p>
          <p class="card-text text-muted">
            Esta es la página de detalle del destino, accedida mediante un parámetro de URL.
          </p>
          <!-- Navegación relativa con routerLink -->
          <a routerLink="../listar" class="btn btn-secondary">
            ← Volver al listado
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
