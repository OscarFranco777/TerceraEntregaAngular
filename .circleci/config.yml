version: 2
jobs:
  build:
    working_directory: ~/myapp
    docker:
      - image: cimg/node:20.11-browsers
    steps:
      - checkout:
          path: ~/myapp
      - restore_cache:
          key: angular-whishlist-{{ .Branch }}-{{ checksum "package-lock.json" }}
      - run: npm install
      - save_cache:
          key: angular-whishlist-{{ .Branch }}-{{ checksum "package-lock.json" }}
          paths:
            - "node_modules"
      - run: npm run test -- --no-watch
      - run: npm run build
